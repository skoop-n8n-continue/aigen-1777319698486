<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realeaf Botanicals</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --bg2: #101010;
      --bg3: #161616;
      --bg4: #1e1e1e;
      --border: #232323;
      --border2: #2e2e2e;
      --text: #ffffff;
      --text2: #999999;
      --text3: #555555;
      --green: #3d7a45;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body { opacity: 0; transition: opacity 0.3s ease; }
    body.loaded { opacity: 1; }

    img { display: block; }

    /* ─── HEADER ─── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .hdr-logo { height: 36px; object-fit: contain; }

    .hdr-right { display: flex; align-items: center; gap: 16px; }

    .back-btn {
      display: none; align-items: center; gap: 8px;
      background: none; border: 1px solid var(--border2);
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
      padding: 8px 18px; border-radius: 6px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .back-btn:hover { background: var(--bg3); border-color: #444; }
    .back-btn.show { display: flex; }

    .back-btn svg { flex-shrink: 0; }

    /* ─── SCREENS ─── */
    .screen { display: none; animation: fadeIn 0.3s ease; }
    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════
       BRANDS SCREEN
    ═══════════════════════════════ */
    .brands-wrap {
      padding: 64px 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .brands-hero {
      text-align: center;
      margin-bottom: 64px;
    }

    .brands-hero-eyebrow {
      font-size: 12px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green2);
      margin-bottom: 14px;
    }

    .brands-hero h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      line-height: 1;
      margin-bottom: 16px;
    }

    .brands-hero p {
      font-size: 16px; color: var(--text2);
      line-height: 1.7; max-width: 520px; margin: 0 auto;
    }

    .brands-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 720px) { .brands-grid { grid-template-columns: 1fr; } }
    @media (min-width: 1300px) { .brands-grid { grid-template-columns: repeat(4, 1fr); } }

    .brand-card {
      position: relative; overflow: hidden; border-radius: 14px;
      aspect-ratio: 16/10; cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.32s cubic-bezier(0.2,0,0.1,1),
                  box-shadow 0.32s ease, border-color 0.32s ease;
    }

    .brand-card:hover { transform: translateY(-5px) scale(1.01); }

    .brand-card-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform 0.5s cubic-bezier(0.2,0,0.1,1);
    }
    .brand-card:hover .brand-card-bg { transform: scale(1.06); }

    .brand-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.5) 50%,
        rgba(0,0,0,0.15) 100%
      );
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 24px 22px 22px;
    }

    .brand-card-logo {
      height: 38px; object-fit: contain; object-position: left;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
      transition: filter 0.2s;
    }
    .brand-card:hover .brand-card-logo { filter: drop-shadow(0 2px 12px rgba(255,255,255,0.2)); }

    .brand-card-tagline {
      font-size: 12px; color: rgba(255,255,255,0.65);
      line-height: 1.5; margin-bottom: 14px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .brand-card-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Oswald', sans-serif; font-size: 12px;
      font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 4px; width: fit-content;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.07);
      color: white;
      transition: background 0.2s, border-color 0.2s;
    }
    .brand-card:hover .brand-card-btn {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.55);
    }

    /* ═══════════════════════════════
       BRAND DETAIL SCREEN
    ═══════════════════════════════ */
    .brand-hero {
      position: relative; height: min(420px, 50vw);
      overflow: hidden;
    }

    .brand-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }

    .brand-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        105deg,
        rgba(8,8,8,0.97) 0%,
        rgba(8,8,8,0.78) 42%,
        rgba(8,8,8,0.2) 75%,
        transparent 100%
      );
      display: flex; align-items: center;
      padding: 0 60px;
    }

    .brand-hero-content { max-width: 560px; }

    .brand-hero-logo {
      height: 64px; object-fit: contain; object-position: left;
      margin-bottom: 22px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    .brand-hero-tagline {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(17px, 2.2vw, 24px);
      font-weight: 500; letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .brand-hero-desc {
      font-size: 14px; color: rgba(255,255,255,0.62);
      line-height: 1.75; max-width: 460px;
    }

    .brand-accent-bar { height: 3px; width: 100%; }

    /* ─── Products Section ─── */
    .products-section {
      padding: 40px 48px 72px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .products-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 20px;
      margin-bottom: 28px; flex-wrap: wrap;
    }

    .products-title-row { display: flex; align-items: baseline; gap: 10px; }

    .products-title {
      font-family: 'Oswald', sans-serif;
      font-size: 26px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .products-count {
      font-size: 14px; color: var(--text3);
      font-weight: 500;
    }

    .filter-wrap { display: flex; gap: 8px; flex-wrap: wrap; }

    .filter-chip {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border2);
      font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
      color: var(--text2); cursor: pointer;
      transition: all 0.18s; background: none;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .filter-chip:hover { color: var(--text); border-color: #555; }
    .filter-chip.on { background: var(--chip-bg,rgba(255,255,255,0.08)); border-color: var(--chip-border,#555); color: var(--chip-text,white); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .prod-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .prod-card:hover { transform: translateY(-4px); border-color: var(--border2); }
    .prod-card.hidden { display: none; }

    .prod-thumb {
      width: 100%; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    .prod-thumb-logo {
      height: 32px; opacity: 0.28; object-fit: contain;
      position: relative; z-index: 1;
      transition: opacity 0.2s;
    }
    .prod-card:hover .prod-thumb-logo { opacity: 0.45; }

    .prod-body { padding: 14px 14px 16px; }

    .prod-name {
      font-family: 'Oswald', sans-serif; font-size: 15px;
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em; line-height: 1.25;
      margin-bottom: 4px;
    }

    .prod-sub { font-size: 11px; color: var(--text2); margin-bottom: 10px; }

    .prod-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .ptag {
      font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
    }

    .no-results {
      grid-column: 1/-1;
      text-align: center; padding: 60px 20px;
      color: var(--text3); font-size: 15px;
    }

    /* ═══════════════════════════════
       MODAL
    ═══════════════════════════════ */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 18px; max-width: 660px; width: 100%;
      max-height: 88vh; overflow-y: auto;
      position: relative;
      animation: mIn 0.22s cubic-bezier(0.2,0,0.1,1);
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }

    @keyframes mIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    .modal::-webkit-scrollbar { width: 5px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(255,255,255,0.12); }

    .modal-img-wrap {
      width: 100%; height: 240px; border-radius: 16px 16px 0 0;
      overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .modal-img-logo {
      height: 64px; opacity: 0.35; object-fit: contain;
      position: relative; z-index: 1;
    }

    .modal-accent { height: 3px; width: 100%; }

    .modal-body { padding: 26px 30px 32px; }

    .modal-brand-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 4px 11px; border-radius: 4px;
      margin-bottom: 14px;
    }

    .modal-name {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(24px, 4vw, 32px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.05;
      margin-bottom: 6px;
    }

    .modal-sub { font-size: 14px; color: var(--text2); margin-bottom: 18px; }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }

    .mtag {
      font-size: 12px; padding: 5px 12px; border-radius: 16px;
      border: 1px solid var(--border2); color: var(--text2); font-weight: 500;
    }

    .modal-divider { height: 1px; background: var(--border); margin: 20px 0; }

    .modal-desc {
      font-size: 14px; line-height: 1.82; color: var(--text2);
      margin-bottom: 24px;
    }

    .modal-details-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }

    .mdetail {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
    }

    .mdetail-label {
      font-size: 10px; color: var(--text3); font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
    }

    .mdetail-value { font-size: 14px; font-weight: 500; }

    /* ─── Scrollbar global ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    @media (max-width: 600px) {
      .hdr { padding: 0 20px; }
      .brands-wrap { padding: 40px 20px 60px; }
      .brand-hero-overlay { padding: 0 24px; }
      .products-section { padding: 28px 20px 60px; }
      .modal-body { padding: 20px 20px 28px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="hdr">
  <img src="" alt="" class="hdr-logo" id="hdrLogo">
  <div class="hdr-right">
    <button class="back-btn" id="backBtn" onclick="showBrands()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      All Brands
    </button>
  </div>
</header>

<!-- ══════════════════════
     BRANDS SCREEN
══════════════════════ -->
<div class="screen active" id="brandsScreen">
  <div class="brands-wrap">
    <div class="brands-hero">
      <div class="brands-hero-eyebrow" id="heroEyebrow"></div>
      <h1 id="heroHeadline"></h1>
      <p id="heroDescription"></p>
    </div>
    <div class="brands-grid" id="brandsGrid"></div>
  </div>
</div>

<!-- ══════════════════════
     BRAND DETAIL SCREEN
══════════════════════ -->
<div class="screen" id="detailScreen">
  <div class="brand-hero">
    <div class="brand-hero-bg" id="detailHeroBg"></div>
    <div class="brand-hero-overlay">
      <div class="brand-hero-content">
        <img id="detailLogo" src="" alt="" class="brand-hero-logo">
        <div class="brand-hero-tagline" id="detailTagline"></div>
        <p class="brand-hero-desc" id="detailDesc"></p>
      </div>
    </div>
  </div>
  <div class="brand-accent-bar" id="detailAccentBar"></div>

  <div class="products-section">
    <div class="products-header">
      <div class="products-title-row">
        <span class="products-title">Products</span>
        <span class="products-count" id="productsCount"></span>
      </div>
      <div class="filter-wrap" id="filterWrap"></div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<!-- ══════════════════════
     PRODUCT MODAL
══════════════════════ -->
<div class="modal-backdrop" id="modalBackdrop" onclick="backdropClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap" id="modalImgWrap"></div>
    <div class="modal-accent" id="modalAccent"></div>
    <div class="modal-body">
      <div class="modal-brand-badge" id="modalBadge"></div>
      <h2 class="modal-name" id="modalName"></h2>
      <p class="modal-sub" id="modalSub"></p>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-divider"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-details-grid" id="modalDetails"></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════
   DATA LOADING
════════════════════════════ */
async function loadAppData() {
  try {
    const response = await fetch('data.json');
    const data = await response.json();
    return data;
  } catch (error) {
    console.error('Failed to load app data:', error);
    return null;
  }
}

/* ════════════════════════════
   STATE
════════════════════════════ */
let BRANDS = [];
let PRODUCTS = [];
let activeBrand = null;
let activeFilter = 'All';

/* ════════════════════════════
   HELPERS
════════════════════════════ */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function applyBrandStyles(brands) {
  let css = '';
  brands.forEach(brand => {
    const color = brand.accent_color;
    const glow = hexToRgba(color, 0.12);
    css += `.brand-card[data-brand="${brand.id}"]:hover{box-shadow:0 24px 60px ${glow},0 0 0 1px ${color};border-color:${color}}\n`;
  });
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);
}

function parseTags(tagStr) {
  return tagStr ? tagStr.split(',').map(t => t.trim()).filter(Boolean) : [];
}

/* ════════════════════════════
   INIT
════════════════════════════ */
async function init() {
  const data = await loadAppData();

  if (!data) {
    document.body.classList.add('loaded');
    return;
  }

  const storefront = data.sections.storefront;
  const settings = data.sections.app_settings;
  BRANDS = data.sections.brands.value;
  PRODUCTS = data.sections.products.value;

  // Apply data-driven CSS variables
  document.documentElement.style.setProperty('--green2', settings.green_accent_color.value);

  // Inject per-brand hover styles
  applyBrandStyles(BRANDS);

  // Apply storefront
  document.title = storefront.page_title.value;
  const logo = document.getElementById('hdrLogo');
  logo.src = storefront.header_logo.value;
  logo.alt = storefront.eyebrow_text.value;
  document.getElementById('heroEyebrow').textContent = storefront.eyebrow_text.value;
  document.getElementById('heroHeadline').textContent = storefront.hero_headline.value;
  document.getElementById('heroDescription').textContent = storefront.hero_description.value;

  // Render brands grid
  renderBrands();

  // Reveal app
  document.body.classList.add('loaded');
}

document.addEventListener('DOMContentLoaded', init);

/* ════════════════════════════
   BRANDS SCREEN
════════════════════════════ */
function renderBrands() {
  const grid = document.getElementById('brandsGrid');
  grid.innerHTML = BRANDS.map(b => `
    <div class="brand-card" data-brand="${b.id}" onclick="openBrand('${b.id}')">
      <div class="brand-card-bg" style="background-image:url('${b.hero_image}')"></div>
      <div class="brand-card-overlay">
        <img src="${b.logo_white}" alt="${b.name}" class="brand-card-logo">
        <p class="brand-card-tagline">${b.tagline}</p>
        <div class="brand-card-btn">Explore ${b.name} <span style="opacity:.7">›</span></div>
      </div>
    </div>
  `).join('');
}

/* ════════════════════════════
   OPEN BRAND
════════════════════════════ */
function openBrand(id) {
  const b = BRANDS.find(x => x.id === id);
  if (!b) return;
  activeBrand = b;
  activeFilter = 'All';

  document.getElementById('detailHeroBg').style.backgroundImage = `url('${b.hero_image}')`;
  document.getElementById('detailLogo').src = b.logo_white;
  document.getElementById('detailLogo').alt = b.name;
  document.getElementById('detailTagline').textContent = b.tagline;
  document.getElementById('detailDesc').textContent = b.description;
  document.getElementById('detailAccentBar').style.background = b.accent_color;

  document.getElementById('backBtn').classList.add('show');

  const brandProducts = PRODUCTS.filter(p => p.brand === id);
  buildFilters(brandProducts);
  renderProducts(brandProducts);

  document.getElementById('brandsScreen').classList.remove('active');
  document.getElementById('detailScreen').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function showBrands() {
  document.getElementById('detailScreen').classList.remove('active');
  document.getElementById('brandsScreen').classList.add('active');
  document.getElementById('backBtn').classList.remove('show');
  activeBrand = null;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ════════════════════════════
   FILTERS
════════════════════════════ */
function buildFilters(products) {
  const allTags = ['All', ...new Set(products.flatMap(p => parseTags(p.tags)))];
  const color = activeBrand.accent_color;
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = allTags.map(t => `
    <button class="filter-chip ${t === 'All' ? 'on' : ''}"
            data-tag="${t}"
            style="${t === 'All' ? chipStyle(color) : ''}"
            onclick="applyFilter('${t}',this)">
      ${t}
    </button>
  `).join('');
}

function chipStyle(color) {
  return `--chip-bg:${color}18;--chip-border:${color};--chip-text:${color};`;
}

function applyFilter(tag, btn) {
  activeFilter = tag;
  const color = activeBrand.accent_color;

  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.remove('on');
    c.style.cssText = '';
  });
  btn.classList.add('on');
  btn.style.cssText = chipStyle(color);

  let shown = 0;
  document.querySelectorAll('.prod-card').forEach(card => {
    const tags = card.dataset.tags.split(',');
    if (tag === 'All' || tags.includes(tag)) {
      card.classList.remove('hidden');
      shown++;
    } else {
      card.classList.add('hidden');
    }
  });

  document.getElementById('productsCount').textContent = `${shown} item${shown !== 1 ? 's' : ''}`;
}

/* ════════════════════════════
   PRODUCTS GRID
════════════════════════════ */
function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  const b = activeBrand;

  grid.innerHTML = products.map(p => {
    const tags = parseTags(p.tags);
    const hasBg = !!p.image_url;
    return `
      <div class="prod-card" data-id="${p.id}" data-tags="${p.tags}"
           onclick="openProduct('${p.id}')">
        <div class="prod-thumb" style="${hasBg ? `background:url('${p.image_url}') center/cover` : `background:${p.gradient}`}">
          ${hasBg ? '' : `<img src="${b.logo_white}" alt="${b.name}" class="prod-thumb-logo">`}
        </div>
        <div class="prod-body">
          <div class="prod-name">${p.name}</div>
          <div class="prod-sub">${p.subtitle}</div>
          <div class="prod-tags">
            ${tags.slice(0, 4).map(t => `<span class="ptag">${t}</span>`).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('productsCount').textContent =
    `${products.length} item${products.length !== 1 ? 's' : ''}`;
}

/* ════════════════════════════
   PRODUCT MODAL
════════════════════════════ */
function openProduct(id) {
  const b = activeBrand;
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;

  const hasBg = !!p.image_url;
  const tags = parseTags(p.tags);

  document.getElementById('modalImgWrap').innerHTML = `
    <div style="position:absolute;inset:0;${hasBg ? `background:url('${p.image_url}') center/cover` : `background:${p.gradient}`}"></div>
    ${hasBg ? '' : `<img src="${b.logo_white}" alt="${b.name}" class="modal-img-logo">`}
  `;
  document.getElementById('modalImgWrap').style.position = 'relative';

  document.getElementById('modalAccent').style.background = b.accent_color;

  const badge = document.getElementById('modalBadge');
  badge.textContent = b.name;
  badge.style.cssText = `background:${b.accent_color}1a;color:${b.accent_color};border:1px solid ${b.accent_color}35;`;

  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalSub').textContent = p.subtitle;
  document.getElementById('modalDesc').textContent = p.description;

  document.getElementById('modalTags').innerHTML =
    tags.map(t => `<span class="mtag">${t}</span>`).join('');

  const detailPairs = [];
  for (let i = 1; i <= 4; i++) {
    const label = p[`detail_${i}_label`];
    const value = p[`detail_${i}_value`];
    if (label && value) detailPairs.push({ label, value });
  }

  document.getElementById('modalDetails').innerHTML =
    detailPairs.map(({ label, value }) => `
      <div class="mdetail">
        <div class="mdetail-label">${label}</div>
        <div class="mdetail-value">${value}</div>
      </div>
    `).join('');

  document.getElementById('modal').scrollTop = 0;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

function backdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
